server:
  port: 30130
  servlet:
    session:
      cookie:
        name: DUMJSESSIONID

turing:
  url: http://localhost:2700
  apiKey: 4618ac5e0e5640f8bd8ea8c83
  solr:
    endpoint: http://localhost:8983

dumont:
  url: http://localhost:30130
  allowedOrigins: "http://localhost:5173,http://localhost:2700"
  multi-tenant: false
  # Authentication / permission model.
  # permissions=false grants ROLE_ADMIN + all privileges to every authenticated user.
  permissions: true
  # When keycloak=true, Spring Security delegates login to the Keycloak realm
  # configured under spring.security.oauth2.client.provider.keycloak.
  keycloak: false
  keycloak-admin-id: ~
  authentication:
    # Enable third-party OAuth2 login buttons (Google, GitHub, ...)
    thirdparty: true
    # Enable the /api/v2/user/register self-service sign-up endpoint.
    new-user: false
  job.size: 50
  cron: "-"
  cron.zone: UTC
  audit:
    cron: "0 0 3 * * *"
    cron.zone: UTC
  dependencies.enabled: false
  reactive.indexing: false
  reactive.parallelism: 10
  dns:
    cache:
      ttl: 60
      negative.ttl: 0
  aem.querybuilder: true
  aem.querybuilder.parallelism: 10
  scheduler:
    enabled: false
  indexing:
    # Indexing provider: turing, solr, or elasticsearch
    # Default is turing (if not specified)
    provider: turing
    solr:
      # Solr configuration (required when provider is solr)
      url: http://localhost:8983/solr
      collection: dumont
    elasticsearch:
      # Elasticsearch configuration (required when provider is elasticsearch)
      url: http://localhost:9200
      index: dumont
      # Optional authentication
      username: ~
      password: ~

spring:
  h2:
    console:
      enabled: false
      path: /h2
      settings:
        web-allow-others: true
  datasource:
    url: jdbc:h2:file:./store/db/dumontDB
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        "[globally_quoted_identifiers]": true
        "[enable_lazy_load_no_trans]": true
        "[generate_statistics]": false
      jakarta:
        persistence:
          sharedCache:
            mode: ALL
    hibernate:
      ddl-auto: update
    show-sql: false
  jmx:
    default-domain: com.viglet.dumont.connector.persistence.model
  output:
    ansi:
      enabled: always
  profiles:
    active: production
  artemis:
    mode: EMBEDDED
    broker-url: localhost:61616
    embedded:
      enabled: true
      persistent: true
      data-directory: store/queue
      queues: connector-indexing.queue
    pool:
      max-connections: 10
  jms:
    template:
      default-destination: connector-indexing.queue
logging:
  config: classpath:logback-spring.xml
  level:
    org:
      springframework: INFO
      apache: INFO
      "[apache.activemq]": ERROR
    com:
      viglet: INFO
  file:
    name: store/logs/dum-connector.log
  logback:
    rollingpolicy:
      max-file-size: 25MB
      max-history: 10
