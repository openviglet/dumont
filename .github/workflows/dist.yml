name: Build Distribution

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install NSIS
        run: sudo apt-get update && sudo apt-get install -y nsis nsis-pluginapi

      - name: Build and package all distributions
        run: |
          chmod +x scripts/package-dist.sh
          ./scripts/package-dist.sh

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: dumont-zip
          path: target/dumont-install.zip
          retention-days: 90

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: dumont-appimage
          path: target/Dumont-DEP-*.AppImage
          retention-days: 90

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: dumont-exe
          path: target/dumont-install.exe
          retention-days: 90
