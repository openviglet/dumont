# Dumont Connector - Sample Configuration
# Copy this file and edit the values below.
dumont.aem.querybuilder=true
dumont.aem.querybuilder.parallelism=10

# Indexing provider (options: turing, elasticsearch, solr)
dumont.indexing.provider=turing

# Turing ES connection
turing.url=http://localhost:2700
turing.apiKey=YOUR_TURING_API_KEY

# Elasticsearch connection
dumont.indexing.elasticsearch.url=http://localhost:9200
dumont.indexing.elasticsearch.index=dumont

# Solr connection
dumont.indexing.solr.url=http://localhost:8983/solr
dumont.indexing.solr.core=dumont

# Server port (use different ports for multiple connector instances)
server.port=30130

# Database (default: embedded H2 — uncomment below for PostgreSQL)
# spring.datasource.url=jdbc:postgresql://localhost:5432/dumont_db
# spring.datasource.username=dumont
# spring.datasource.password=changeme
# spring.datasource.driver-class-name=org.postgresql.Driver
